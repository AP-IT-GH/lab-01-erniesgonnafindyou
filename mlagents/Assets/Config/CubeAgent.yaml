behaviors:
  CubeAgent:
    trainer_type: ppo
    hyperparameters:
      # Veel stabieler voor kleine navigatietaken
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 5.0e-3 # Iets hoger om exploratie te stimuleren (hij moet die zone zoeken!)
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 500000 # Geef hem wat meer tijd om het te snappen
    time_horizon: 64
    summary_freq: 1000 # Hoeft niet elke seconde een update te geven in TensorBoard